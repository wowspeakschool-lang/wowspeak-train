<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#7B61FF">
    <title>📖 WowSpeak Train — словарный тренажёр</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --purple:        #7B61FF;
            --purple-dark:   #5A45D9;
            --purple-light:  #F0ECFF;
            --orange:        #FF8C42;
            --orange-light:  #FFE8D6;
            --pink:          #E91E8C;
            --green:         #22C55E;
            --green-light:   #DCFCE7;
            --red:           #EF4444;
            --red-light:     #FEE2E2;
            --yellow:        #F59E0B;
            --yellow-light:  #FEF3C7;
            --blue-light:    #DBEAFE;

            --cream:         #FFFBF2;
            --cream-dark:    #F5EFE2;
            --dark:          #2D2D3F;
            --gray-text:     #5A5A6E;
            --gray-light:    #94A3B8;
            --border:        #E5E7EB;
            --white:         #FFFFFF;

            --radius:        14px;
            --radius-lg:     20px;
            --shadow-sm:     0 1px 3px rgba(45,45,63,.06);
            --shadow:        0 4px 16px rgba(45,45,63,.08);
            --shadow-lg:     0 12px 32px rgba(45,45,63,.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: inherit; }

        html, body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--dark);
            background: var(--cream);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-image:
                radial-gradient(circle, rgba(123,97,255,.04) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        button {
            cursor: pointer; border: none; background: none;
            font: inherit; color: inherit;
        }

        a { color: var(--purple); text-decoration: none; }

        /* ============ HEADER ============ */
        .app-header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(255,251,242,.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--cream-dark);
            padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 16px;
        }
        .logo {
            font-family: 'Fredoka', sans-serif; font-weight: 600;
            font-size: 22px; color: var(--purple);
            display: flex; align-items: center; gap: 8px;
        }
        .logo-emoji { font-size: 26px; }

        .header-right {
            display: flex; align-items: center; gap: 12px;
            font-size: 14px; color: var(--gray-text);
        }
        .header-user { font-weight: 700; color: var(--dark); }

        /* ============ STUDENT CONTEXT BAR ============ */
        .student-context {
            background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
            color: white;
            padding: 14px 20px;
            display: flex; align-items: center; gap: 12px;
            font-weight: 700;
        }
        .student-context-icon {
            background: rgba(255,255,255,.2);
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .student-context-text { flex: 1; }
        .student-context-text .label { font-size: 12px; opacity: .85; font-weight: 600; }
        .student-context-text .name  { font-size: 16px; }
        .student-context .btn-exit {
            background: rgba(255,255,255,.18);
            color: white; padding: 6px 12px;
            border-radius: 10px; font-size: 13px; font-weight: 700;
        }
        .student-context .btn-exit:hover { background: rgba(255,255,255,.28); }

        /* ============ MAIN ============ */
        .app-main {
            max-width: 1100px; margin: 0 auto;
            padding: 24px 20px 80px;
        }

        h1 { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 28px; }
        h2 { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 22px; }
        h3 { font-weight: 800; font-size: 16px; }

        /* ============ TABS ============ */
        .tabs {
            display: flex; gap: 8px;
            margin: 20px 0 24px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 10px 18px;
            border-radius: 999px;
            background: var(--white);
            border: 1.5px solid var(--border);
            font-weight: 700; font-size: 14px;
            color: var(--gray-text);
            white-space: nowrap;
            transition: all .15s ease;
        }
        .tab:hover { border-color: var(--purple); color: var(--purple); }
        .tab.active {
            background: var(--purple); border-color: var(--purple);
            color: white;
        }

        /* ============ DECK GRID ============ */
        .decks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        .deck-card {
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            cursor: pointer;
            transition: all .15s ease;
            position: relative;
        }
        .deck-card:hover {
            border-color: var(--purple);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .deck-cover {
            font-size: 36px; line-height: 1;
            margin-bottom: 10px;
        }
        .deck-title {
            font-weight: 800; font-size: 16px;
            margin-bottom: 4px; color: var(--dark);
            line-height: 1.3;
        }
        .deck-meta {
            font-size: 13px; color: var(--gray-text);
            font-weight: 600;
        }
        .deck-progress {
            margin-top: 12px;
            height: 6px; background: var(--cream-dark);
            border-radius: 3px; overflow: hidden;
        }
        .deck-progress-bar {
            height: 100%;
            background: var(--green);
            transition: width .3s ease;
        }
        .deck-progress-text {
            font-size: 11px; font-weight: 700;
            color: var(--gray-text);
            margin-top: 4px;
        }
        .deck-badge {
            position: absolute; top: 10px; right: 10px;
            font-size: 11px; font-weight: 800;
            background: var(--yellow-light); color: #92400E;
            padding: 3px 8px; border-radius: 999px;
        }

        .deck-card.new-deck {
            background: var(--purple-light);
            border-style: dashed; border-color: var(--purple);
            color: var(--purple);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; min-height: 140px;
        }
        .deck-card.new-deck:hover { background: #E6E0FF; }
        .deck-card.new-deck .deck-cover { color: var(--purple); }

        /* ============ REVIEW HERO ============ */
        .review-hero {
            background: linear-gradient(135deg, #FFE8D6 0%, #FFD4B5 100%);
            border-radius: var(--radius-lg);
            padding: 22px 24px;
            display: flex; align-items: center; gap: 18px;
            margin-bottom: 24px;
            border: 1.5px solid var(--orange);
        }
        .review-hero-emoji {
            font-size: 48px; line-height: 1;
        }
        .review-hero-text { flex: 1; min-width: 0; }
        .review-hero-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600; font-size: 20px; color: #C2410C;
            margin-bottom: 2px;
        }
        .review-hero-subtitle {
            font-size: 14px; font-weight: 700; color: #9A3412;
        }
        .review-hero .btn-primary {
            background: var(--orange); color: white;
            border-color: var(--orange);
        }
        .review-hero .btn-primary:hover { background: #EA7A35; }

        /* ============ BUTTONS ============ */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 800; font-size: 14px;
            transition: all .15s ease;
            border: 1.5px solid transparent;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--purple); color: white;
            border-color: var(--purple);
        }
        .btn-primary:hover { background: var(--purple-dark); }
        .btn-secondary {
            background: var(--white); color: var(--gray-text);
            border-color: var(--border);
        }
        .btn-secondary:hover { border-color: var(--purple); color: var(--purple); }
        .btn-large { padding: 14px 28px; font-size: 16px; border-radius: 14px; }

        /* ============ EMPTY STATE ============ */
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--gray-light);
        }
        .empty-state-emoji { font-size: 56px; margin-bottom: 12px; }
        .empty-state-title { font-weight: 800; font-size: 18px; color: var(--gray-text); margin-bottom: 8px; }
        .empty-state-text { font-size: 14px; max-width: 380px; margin: 0 auto; }

        /* ============ LOADING / LOGIN OVERLAYS ============ */
        .overlay {
            position: fixed; inset: 0;
            background: var(--cream);
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .loading-spinner {
            width: 48px; height: 48px;
            border: 4px solid var(--purple-light);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .login-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 32px 28px;
            max-width: 380px; width: 100%;
            box-shadow: var(--shadow-lg);
        }
        .login-card h2 {
            text-align: center; margin-bottom: 6px;
        }
        .login-card .subtitle {
            text-align: center; font-size: 14px; color: var(--gray-text);
            margin-bottom: 22px;
        }
        .login-card label {
            display: block; font-size: 13px; font-weight: 800;
            color: var(--gray-text); margin-bottom: 6px;
        }
        .login-card input {
            width: 100%; padding: 12px 14px;
            border: 1.5px solid var(--border); border-radius: 12px;
            font-size: 15px; margin-bottom: 14px;
            outline: none; transition: border-color .15s;
        }
        .login-card input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 4px var(--purple-light);
        }
        .login-card .btn { width: 100%; padding: 14px; }
        .login-error {
            background: var(--red-light); color: #991B1B;
            padding: 10px 14px; border-radius: 10px;
            font-size: 13px; font-weight: 700;
            margin-bottom: 14px;
        }

        /* ============ MOBILE ============ */
        @media (max-width: 600px) {
            .app-header { padding: 10px 14px; }
            .logo { font-size: 18px; }
            .logo-emoji { font-size: 22px; }
            .header-right { font-size: 13px; }
            .app-main { padding: 16px 14px 80px; }
            h1 { font-size: 22px; }
            .decks-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .deck-card { padding: 14px; }
            .deck-cover { font-size: 30px; }
            .deck-title { font-size: 14px; }
        }
    </style>
</head>
<body>

    <!-- ============ LOADING ============ -->
    <div id="loadingOverlay" class="overlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- ============ LOGIN ============ -->
    <div id="loginOverlay" class="overlay" style="display:none;">
        <div class="login-card">
            <h2>📖 WowSpeak Train</h2>
            <div class="subtitle">Войдите тем же аккаунтом, что и в WowSpeak</div>
            <div id="loginError" class="login-error" style="display:none;"></div>
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" autocomplete="email" placeholder="you@example.com">
            <label for="loginPassword">Пароль</label>
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••">
            <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Войти</button>
        </div>
    </div>

    <!-- ============ APP ============ -->
    <div id="app" style="display:none;">

        <header class="app-header">
            <a href="#/" class="logo">
                <span class="logo-emoji">📖</span>
                <span>WowSpeak Train</span>
            </a>
            <div class="header-right">
                <span id="headerUser" class="header-user"></span>
                <button class="btn btn-secondary" style="padding:8px 14px; font-size:13px;" onclick="doLogout()">Выйти</button>
            </div>
        </header>

        <!-- Контекст ученика (показываем когда ?student=... в URL) -->
        <div id="studentContext" class="student-context" style="display:none;">
            <div class="student-context-icon">🎓</div>
            <div class="student-context-text">
                <div class="label">ТРЕНИРУЕМ С УЧЕНИКОМ</div>
                <div class="name" id="studentContextName">—</div>
            </div>
            <button class="btn-exit" onclick="exitStudentContext()">← Выйти из режима</button>
        </div>

        <main class="app-main">

            <!-- Главный экран: список колод -->
            <section id="screenDecks">

                <!-- Hero "Повторение" (если есть слова к повторению) -->
                <div id="reviewHero" class="review-hero" style="display:none;">
                    <div class="review-hero-emoji">🔁</div>
                    <div class="review-hero-text">
                        <div class="review-hero-title">Пора повторить!</div>
                        <div class="review-hero-subtitle" id="reviewHeroSubtitle">10 слов ждут повторения</div>
                    </div>
                    <button class="btn btn-primary" onclick="startReviewSession()">Начать</button>
                </div>

                <h1>Словарь</h1>

                <div class="tabs">
                    <button class="tab active" data-tab="library" onclick="switchTab('library')">📚 Библиотека школы</button>
                    <button class="tab" data-tab="my" onclick="switchTab('my')">🗂 Мои колоды</button>
                </div>

                <div id="decksGrid" class="decks-grid">
                    <!-- Колоды рендерятся динамически -->
                </div>

                <div id="decksEmpty" class="empty-state" style="display:none;">
                    <div class="empty-state-emoji">🗂</div>
                    <div class="empty-state-title">Пока нет колод</div>
                    <div class="empty-state-text">Создай первую — добавь слова и можно тренироваться с учениками.</div>
                    <button class="btn btn-primary btn-large" style="margin-top:18px;" onclick="openCreateDeck()">+ Создать колоду</button>
                </div>

            </section>

        </main>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ============================================================
        // SUPABASE — shared session между поддоменами .wowteach.ru
        // ============================================================
        const SUPABASE_URL = 'https://api.wowteach.ru';
        const SUPABASE_KEY = 'sb_publishable_nZIl9kzPNhkd9Gbsm7aAgA_cAeY1s4x';

        // Cookie-storage с domain=.wowteach.ru — сессия видна всем поддоменам:
        // app.wowteach.ru, train.wowteach.ru, и т.д.
        // Используется только когда мы реально на одном из этих поддоменов.
        // На github.io и других — обычный localStorage (cookies на чужой домен не поставить).
        const isWowteachDomain = location.hostname.endsWith('.wowteach.ru');

        const sharedCookieStorage = {
            getItem: (key) => {
                const escaped = key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const m = document.cookie.match(new RegExp('(?:^|; )' + escaped + '=([^;]+)'));
                return m ? decodeURIComponent(m[1]) : null;
            },
            setItem: (key, value) => {
                // max-age=31536000 = 1 год; secure требует HTTPS; samesite=lax — безопасно для same-site навигации
                document.cookie = `${key}=${encodeURIComponent(value)}; domain=.wowteach.ru; path=/; max-age=31536000; secure; samesite=lax`;
            },
            removeItem: (key) => {
                document.cookie = `${key}=; domain=.wowteach.ru; path=/; max-age=0; secure; samesite=lax`;
            }
        };

        const sb = isWowteachDomain
            ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                auth: { storage: sharedCookieStorage }
            })
            : window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;          // запись из users
        let currentTab  = 'library';     // 'library' | 'my'
        let studentCtx  = null;          // {id, name} если тренируем конкретного ученика

        // ============================================================
        // BOOT
        // ============================================================
        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            // 1) Проверяем сессию Supabase
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                showLogin();
                return;
            }

            // 2) Грузим запись users
            const ok = await loadCurrentUser(session.user.id);
            if (!ok) { showLogin(); return; }

            // 3) Парсим URL: ?student=NN — контекст тренировки
            await applyUrlParams();

            // 4) Показываем приложение
            showApp();
            await loadDecks();
            await loadReviewBadge();
        }

        async function loadCurrentUser(uid) {
            const { data, error } = await sb.from('users')
                .select('id, name, email, roles')
                .eq('id', uid)
                .maybeSingle();
            if (error || !data) {
                console.error('Не удалось загрузить пользователя:', error);
                return false;
            }
            currentUser = data;
            document.getElementById('headerUser').textContent = data.name || data.email;
            return true;
        }

        async function applyUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const studentId = params.get('student');
            if (studentId) {
                // Грузим имя ученика
                const { data } = await sb.from('students')
                    .select('id, name')
                    .eq('id', studentId)
                    .maybeSingle();
                if (data) {
                    studentCtx = { id: data.id, name: data.name };
                    document.getElementById('studentContext').style.display = 'flex';
                    document.getElementById('studentContextName').textContent = data.name;
                }
            }
        }

        function exitStudentContext() {
            studentCtx = null;
            document.getElementById('studentContext').style.display = 'none';
            // Чистим URL
            const url = new URL(window.location);
            url.searchParams.delete('student');
            window.history.replaceState({}, '', url.toString());
            loadDecks();
            loadReviewBadge();
        }

        // ============================================================
        // SCREENS
        // ============================================================
        function showLogin() {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            setTimeout(() => document.getElementById('loginEmail').focus(), 100);
        }

        function showApp() {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }

        // ============================================================
        // LOGIN
        // ============================================================
        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errEl.style.display = 'none';
            if (!email || !password) {
                errEl.textContent = 'Введите email и пароль';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            const orig = btn.textContent;
            btn.textContent = 'Вхожу…';

            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                errEl.textContent = error.message || 'Не удалось войти';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = orig;
                return;
            }
            location.reload();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.getElementById('loginOverlay').style.display === 'flex') {
                doLogin();
            }
        });

        async function doLogout() {
            await sb.auth.signOut();
            location.reload();
        }

        // ============================================================
        // DECKS — список колод
        // ============================================================
        async function loadDecks() {
            const grid  = document.getElementById('decksGrid');
            const empty = document.getElementById('decksEmpty');
            grid.innerHTML = '<div style="grid-column:1/-1; padding:40px; text-align:center; color:var(--gray-light);">Загружаю колоды…</div>';
            empty.style.display = 'none';

            // Фильтр: библиотека школы или мои колоды
            let q = sb.from('word_decks')
                .select('id, title, description, level, cover_emoji, author_id, is_school_library, word_count')
                .is('deleted_at', null)
                .order('created_at', { ascending: false });

            if (currentTab === 'library') {
                q = q.eq('is_school_library', true);
            } else {
                q = q.eq('author_id', currentUser.id);
            }

            const { data, error } = await q;
            if (error) {
                grid.innerHTML = `<div style="grid-column:1/-1; padding:40px; text-align:center; color:var(--red);">Ошибка: ${error.message}</div>`;
                return;
            }

            const decks = data || [];

            // Если "Мои колоды" пуст — показываем empty state
            if (decks.length === 0 && currentTab === 'my') {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            // Если "Библиотека" пуста — просто сообщение, но без CTA
            if (decks.length === 0 && currentTab === 'library') {
                grid.innerHTML = `
                    <div style="grid-column:1/-1; padding:40px; text-align:center; color:var(--gray-light);">
                        <div style="font-size:48px; margin-bottom:8px;">📚</div>
                        <div style="font-weight:800; color:var(--gray-text);">Библиотека пока пуста</div>
                        <div style="font-size:13px; margin-top:6px;">Колоды библиотеки создаёт супер-админ</div>
                    </div>`;
                return;
            }

            // Прогресс ученика (если в контексте студента)
            let progressByDeck = {};
            if (studentCtx) {
                progressByDeck = await loadStudentProgressByDeck(studentCtx.id, decks.map(d => d.id));
            }

            grid.innerHTML = '';

            // Карточка "+ Создать колоду" — только в "Мои колоды"
            if (currentTab === 'my') {
                const newCard = document.createElement('div');
                newCard.className = 'deck-card new-deck';
                newCard.innerHTML = `
                    <div class="deck-cover">+</div>
                    <div style="font-weight:800;">Создать колоду</div>
                `;
                newCard.onclick = openCreateDeck;
                grid.appendChild(newCard);
            }

            for (const d of decks) {
                const card = document.createElement('div');
                card.className = 'deck-card';
                card.onclick = () => openDeck(d.id);

                const prog = progressByDeck[d.id] || { learned: 0, due: 0 };
                const total = d.word_count || 0;
                const progressPct = total > 0 ? Math.round((prog.learned / total) * 100) : 0;

                const dueBadge = (studentCtx && prog.due > 0)
                    ? `<div class="deck-badge">${prog.due} к повтору</div>`
                    : '';

                const progressHtml = studentCtx ? `
                    <div class="deck-progress">
                        <div class="deck-progress-bar" style="width:${progressPct}%"></div>
                    </div>
                    <div class="deck-progress-text">${prog.learned} / ${total} выучено</div>
                ` : `
                    <div class="deck-progress-text" style="margin-top:10px;">${total} ${plural(total, 'слово', 'слова', 'слов')}${d.level ? ' · ' + d.level : ''}</div>
                `;

                card.innerHTML = `
                    ${dueBadge}
                    <div class="deck-cover">${d.cover_emoji || '📚'}</div>
                    <div class="deck-title">${escapeHtml(d.title)}</div>
                    ${!studentCtx && d.level ? `<div class="deck-meta">${d.level}</div>` : ''}
                    ${progressHtml}
                `;
                grid.appendChild(card);
            }
        }

        // Прогресс ученика по колодам: сколько выучено, сколько к повтору
        async function loadStudentProgressByDeck(studentId, deckIds) {
            if (!deckIds.length) return {};
            const { data } = await sb.from('student_word_progress')
                .select('word_id, is_learned, next_review_at, words!inner(deck_id)')
                .eq('student_id', studentId);
            const map = {};
            const now = new Date();
            for (const r of (data || [])) {
                const did = r.words?.deck_id;
                if (!did) continue;
                if (!map[did]) map[did] = { learned: 0, due: 0 };
                if (r.is_learned) map[did].learned++;
                if (r.next_review_at && new Date(r.next_review_at) <= now) map[did].due++;
            }
            return map;
        }

        // Бейдж "Повторение" сверху
        async function loadReviewBadge() {
            if (!studentCtx) {
                document.getElementById('reviewHero').style.display = 'none';
                return;
            }
            const { data } = await sb.from('student_word_progress')
                .select('id', { count: 'exact', head: true })
                .eq('student_id', studentCtx.id)
                .lte('next_review_at', new Date().toISOString());
            // TODO: count приходит в свойстве count при head:true
            // упрощённо — пока не используем, просто показываем hero если есть выученные слова
            const { count } = await sb.from('student_word_progress')
                .select('*', { count: 'exact', head: true })
                .eq('student_id', studentCtx.id)
                .eq('is_learned', true);
            if ((count || 0) >= 10) {
                document.getElementById('reviewHero').style.display = 'flex';
                document.getElementById('reviewHeroSubtitle').textContent =
                    `${count} слов готовы к повторению`;
            } else {
                document.getElementById('reviewHero').style.display = 'none';
            }
        }

        // ============================================================
        // TABS
        // ============================================================
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tab);
            });
            loadDecks();
        }

        // ============================================================
        // PLACEHOLDERS — реализуем в следующих итерациях
        // ============================================================
        function openCreateDeck() {
            alert('Конструктор колод — следующая итерация 🛠');
        }

        function openDeck(deckId) {
            alert(`Колода #${deckId}: редактор слов и запуск сессии — следующая итерация 🛠`);
        }

        function startReviewSession() {
            alert('Сессия повторения — следующая итерация 🛠');
        }

        // ============================================================
        // UTILS
        // ============================================================
        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, m =>
                ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m]));
        }

        function plural(n, one, few, many) {
            const mod10  = n % 10;
            const mod100 = n % 100;
            if (mod100 >= 11 && mod100 <= 14) return many;
            if (mod10 === 1) return one;
            if (mod10 >= 2 && mod10 <= 4) return few;
            return many;
        }
    </script>
